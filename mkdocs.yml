site_name: sandboxctl
site_description: OpenShell sandbox management CLI
repo_url: https://github.com/butler54/sandboxctl
repo_name: butler54/sandboxctl

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Commands:
    - Overview: commands/index.md
    - create: commands/create.md
    - open: commands/open.md
    - list: commands/list.md
    - status: commands/status.md
    - delete: commands/delete.md
    - validate: commands/validate.md
    - init: commands/init.md
    - setup: commands/setup.md
    - restart: commands/restart.md
    - upgrade: commands/upgrade.md
    - doctor: commands/doctor.md
    - config: commands/config.md
  - Configuration:
    - Overview: configuration/index.md
    - Profiles: configuration/profiles.md
    - Credentials: configuration/credentials.md
  - Contributing: contributing.md
